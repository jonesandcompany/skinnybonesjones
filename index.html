<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W.A. Jones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Erogenous';
    src: url('fonts/font_1.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --gap: 3px;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  .grid {
    display: grid;
    width: 100vw;
    height: 100vh;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: var(--gap);
    background: var(--black);
  }

  .cell {
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .cell:hover {
    background: #222;
  }

  /* Category label — blend mode so image tones sculpt the type */
  .cat-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Erogenous', serif;
    font-size: clamp(52px, 7vw, 96px);
    font-weight: 400;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    color: var(--white);
    mix-blend-mode: overlay;
    transition: mix-blend-mode 0.2s ease;
    user-select: none;
    padding: 0 2vw;
    text-align: center;
    z-index: 3;
  }

  .cell:hover .cat-label {
    mix-blend-mode: normal;
  }

  /* Sub-project list — bottom left */
  .sub-list {
    position: absolute;
    bottom: 18px;
    left: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--white);
    opacity: 0.4;
    line-height: 1.8;
    transition: opacity 0.3s ease;
    z-index: 3;
  }

  .cell:hover .sub-list {
    opacity: 0.7;
  }

  /* Center nameplate */
  .nameplate-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    pointer-events: none;
  }

  .nameplate {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
    background: var(--black);
    padding: 6px 14px;
    white-space: nowrap;
  }

  /* Registration cross */
  .cross {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9;
    pointer-events: none;
    width: 24px;
    height: 24px;
  }
  .cross::before, .cross::after {
    content: '';
    position: absolute;
    background: var(--black);
  }
  .cross::before {
    width: 1px;
    height: 24px;
    left: 50%;
    top: 0;
  }
  .cross::after {
    width: 24px;
    height: 1px;
    top: 50%;
    left: 0;
  }

  /* Background photo */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-repeat: no-repeat;
    transition: transform 0.6s ease;
    z-index: 0;
  }

  .cell:hover .bg {
    transform: scale(1.03);
  }

  /* Dark scrim */
  .scrim {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.42);
    transition: background 0.4s ease;
    z-index: 1;
  }

  .cell:hover .scrim {
    background: rgba(0,0,0,0.22);
  }

  /* Load animation */
  .cell {
    opacity: 0;
    animation: fadeIn 0.6s ease forwards;
  }
  .cell:nth-child(1) { animation-delay: 0.05s; }
  .cell:nth-child(2) { animation-delay: 0.15s; }
  .cell:nth-child(3) { animation-delay: 0.25s; }
  .cell:nth-child(4) { animation-delay: 0.35s; }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Grain overlay */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.21;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    mix-blend-mode: overlay;
    z-index: 2;
  }
  @media (max-width: 600px) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, 1fr);
      height: auto;
      min-height: 100vh;
    }
    .cell { min-height: 25vh; }
    .cat-label { font-size: clamp(40px, 12vw, 72px); }
  }
</style>
</head>
<body>

<div class="grid">

  <div class="cell">
    <div class="bg" style="background-image: url('images/image_1.jpg'); background-position: center center;"></div>
    <div class="scrim"></div>
    <div class="cat-label">Editorial</div>
    <div class="sub-list">
      Untitled Magazine<br>
      Roses Mag<br>
      Skip Marley<br>
      Eli's Dream
    </div>
  </div>

  <div class="cell">
    <div class="bg" style="background-image: url('images/image_2.jpg'); background-position: center top;"></div>
    <div class="scrim"></div>
    <div class="cat-label">Commercial</div>
    <div class="sub-list">
      Belstaff<br>
      Bond Official<br>
      Le Alfré<br>
      Harden
    </div>
  </div>

  <div class="cell">
    <div class="bg" style="background-image: url('images/image_3.jpg'); background-position: center bottom;"></div>
    <div class="scrim"></div>
    <div class="cat-label">Events</div>
    <div class="sub-list">
      Fora / Rocco Forte<br>
      Harvard Club<br>
      Pardon Me<br>
      Boxers
    </div>
  </div>

  <div class="cell">
    <div class="bg" style="background-image: url('images/image_4.jpg'); background-position: center center;"></div>
    <div class="scrim"></div>
    <div class="cat-label">Travel</div>
    <div class="sub-list">
      Europe<br>
      California<br>
      Mexico<br>
      New York
    </div>
  </div>

</div>

<div class="cross"></div>
<div class="nameplate-wrap">
  <div class="nameplate">W.A. Jones</div>
</div>

</body>
</html>
