<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pardon Me — W.A. Jones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Erogenous';
    src: url('../fonts/font_1.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f2ee;
    --dim: rgba(245,242,238,0.28);
    --margin: 5vw;
    --gap: 4px;
  }

  html, body {
    background: var(--black);
    color: var(--white);
    font-family: 'Erogenous', serif;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1000;
    pointer-events: none;
    opacity: 0.18;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* ── corner back label ── */
  .corner-label {
    position: fixed;
    top: 26px;
    left: 28px;
    z-index: 500;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    opacity: 0;
    transition: opacity 0.15s ease, color 0.2s ease;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .corner-label.visible { opacity: 1; }
  .corner-label:hover { color: var(--white); }

  /* ── title block ── */
  .title-block {
    position: relative;
    z-index: 10;
    padding: 12vh 0 6vh;
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .title-block.hidden {
    opacity: 0;
    transform: translateY(-12px);
    pointer-events: none;
  }

  .title-main {
    display: block;
    width: 100vw;
    height: auto;
    filter:
      drop-shadow(0 0 40px rgba(245,242,238,0.12))
      drop-shadow(0 0 80px rgba(245,242,238,0.06))
      invert(1);
  }

  .title-meta {
    padding: 0 var(--margin);
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .title-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--dim);
  }

  /* ── gallery ── */
  .gallery {
    position: relative;
    z-index: 10;
    padding: 0 var(--margin) 20vh;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* landscape: full column width */
  .img-row {
    width: 100%;
    line-height: 0;
  }

  /* portrait pair: two side by side */
  .img-row.pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap);
  }

  .img-row img,
  .img-row .img-wrap img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 1.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .img-row:hover img,
  .img-wrap:hover img {
    transform: scale(1.014);
  }

  .img-wrap {
    overflow: hidden;
    line-height: 0;
  }

  /* ── fade up ── */
  .fade-up {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .fade-up.in-view { opacity: 1; transform: translateY(0); }

  /* ── back link (bottom) ── */
  .back-link {
    display: block;
    text-align: center;
    padding-bottom: 10vh;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    transition: color 0.2s;
    position: relative;
    z-index: 10;
  }
  .back-link:hover { color: var(--white); }

  /* ── mobile ── */
  @media (max-width: 680px) {
    :root { --margin: 4vw; }
    .img-row.pair {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<a class="corner-label" href="../" id="cornerLabel">← W.A. Jones</a>

<div class="title-block" id="titleBlock">
  <img class="title-main" src="pardonme.svg" alt="Pardon Me">
  <div class="title-meta">
    <span class="title-sub">Opening Night · East Village · New York</span>
  </div>
</div>

<div class="gallery">

  <!-- 1 -->
  <div class="img-row fade-up">
    <img src="pardonme-1.jpg" alt="Pardon Me">
  </div>

  <!-- 5 -->
  <div class="img-row fade-up">
    <img src="pardonme-5.jpg" alt="Pardon Me">
  </div>

  <!-- 6 -->
  <div class="img-row fade-up">
    <img src="pardonme-6.jpg" alt="Pardon Me">
  </div>

  <!-- 18 -->
  <div class="img-row fade-up">
    <img src="pardonme-18.jpg" alt="Pardon Me">
  </div>

  <!-- the toast -->
  <div class="img-row fade-up">
    <img src="pardonme-31.jpg" alt="Pardon Me">
  </div>

  <!-- 3 — landscape: bar in action -->
  <div class="img-row fade-up">
    <img src="pardonme-21.jpg" alt="Pardon Me">
  </div>

  <!-- portrait pair: 17 + 29 -->
  <div class="img-row pair fade-up">
    <div class="img-wrap">
      <img src="pardonme-17.jpg" alt="Pardon Me">
    </div>
    <div class="img-wrap">
      <img src="pardonme-29.jpg" alt="Pardon Me">
    </div>
  </div>

  <!-- landscape: sofa, two women, sunglasses -->
  <div class="img-row fade-up">
    <img src="pardonme-43.jpg" alt="Pardon Me">
  </div>

  <!-- portrait pair: 19 + 8 -->
  <div class="img-row pair fade-up">
    <div class="img-wrap">
      <img src="pardonme-19.jpg" alt="Pardon Me">
    </div>
    <div class="img-wrap">
      <img src="pardonme-8.jpg" alt="Pardon Me">
    </div>
  </div>

  <!-- portrait pair: 14 + 36 -->
  <div class="img-row pair fade-up">
    <div class="img-wrap">
      <img src="pardonme-14.jpg" alt="Pardon Me">
    </div>
    <div class="img-wrap">
      <img src="pardonme-36.jpg" alt="Pardon Me">
    </div>
  </div>

  <!-- landscape: handshake -->
  <div class="img-row fade-up">
    <img src="pardonme-32.jpg" alt="Pardon Me">
  </div>

  <!-- landscape: three women at bar -->
  <div class="img-row fade-up">
    <img src="pardonme-13.jpg" alt="Pardon Me">
  </div>

  <!-- landscape: two women at bar -->
  <div class="img-row fade-up">
    <img src="pardonme-2.jpg" alt="Pardon Me">
  </div>

  <!-- landscape: 41 -->
  <div class="img-row fade-up">
    <img src="pardonme-41.jpg" alt="Pardon Me">
  </div>

  <!-- landscape: group, dance floor -->
  <div class="img-row fade-up">
    <img src="pardonme-12.jpg" alt="Pardon Me">
  </div>

  <!-- landscape: couple at bar, menu visible -->
  <div class="img-row fade-up">
    <img src="pardonme-40.jpg" alt="Pardon Me">
  </div>

  <!-- 42 — end -->
  <div class="img-row fade-up">
    <img src="pardonme-42.jpg" alt="Pardon Me">
  </div>

</div>

<a class="back-link" href="../">← W.A. Jones</a>

<script>
  // fade-up on scroll
  const fadeEls = document.querySelectorAll('.fade-up');
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in-view');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.04 });

  fadeEls.forEach(el => {
    if (el.getBoundingClientRect().top < window.innerHeight) {
      el.classList.add('in-view');
    } else {
      io.observe(el);
    }
  });

  // corner label: snap in on scroll, no fade delay
  const corner = document.getElementById('cornerLabel');
  const title  = document.getElementById('titleBlock');

  window.addEventListener('scroll', () => {
    const past = window.scrollY > window.innerHeight * 0.25;
    corner.classList.toggle('visible', past);
    title.classList.toggle('hidden', past);
  }, { passive: true });
</script>
</body>
</html>
