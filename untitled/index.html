<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Untitled Magazine — W.A. Jones</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --ink: #111111;
      --mid: #999999;
      --sky: #5b9fd4;
      --rule: #e0e0de;
      --pad: 48px;
    }

    body {
      background: var(--white);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px var(--pad);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }

    nav a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
    }

    nav a:hover { color: var(--mid); }

    /* ── MASTHEAD ── */
    .masthead {
      padding-top: 57px;
      border-bottom: 1px solid var(--rule);
    }

    .masthead-inner {
      padding: 52px var(--pad) 40px;
    }

    .pub-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 18px;
    }

    .untitled-logo {
      font-size: clamp(56px, 10vw, 120px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 0.86;
      color: var(--ink);
      user-select: none;
    }

    .untitled-logo .star {
      color: var(--sky);
      font-size: 0.5em;
      vertical-align: 0.14em;
    }

    .masthead-meta {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
    }

    .meta-block { display: flex; flex-direction: column; gap: 5px; }

    .meta-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .meta-value { font-size: 13px; letter-spacing: 0.02em; }
    .meta-value.byline { color: var(--sky); }

    /* ── BODY ── */
    .body {
      padding: 0 var(--pad) 80px;
    }

    /* Every direct child of .body gets top margin — consistent rhythm */
    .body > * {
      margin-top: 4px;
    }

    .body > *:first-child {
      margin-top: 0;
    }

    /* ── IMAGE WRAPPERS ── */
    .img-full { width: 100%; }

    /* Portrait centered — gives breathing room on wide screens */
    .img-center {
      max-width: 680px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Two-col pair — both images natural height, align top */
    .img-pair {
      display: flex;
      gap: 4px;
      align-items: flex-start;
    }

    .img-pair > * { flex: 1; min-width: 0; }

    /* Landscape gets proportionally more width when paired with portrait */
    .img-pair .wide { flex: 1.6; }
    .img-pair .tall { flex: 1; }

    /* ── TEXT BLOCKS — spatial, not decorative ── */
    .text-block {
      padding: 40px 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 40px;
      flex-wrap: wrap;
    }

    .text-block .t-left {
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.05;
      color: var(--ink);
      flex: 1;
      min-width: 200px;
    }

    .text-block .t-right {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 2;
      text-align: right;
      flex: 0 0 auto;
    }

    /* Small inline label — sits between images like a caption header */
    .label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
      padding: 16px 0;
    }

    /* ── SPREAD NOTE ── */
    .spread-note {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--mid);
      font-style: italic;
      padding: 10px 0 0;
    }

    /* ── FADE ── */
    .fade-up {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      padding: 24px var(--pad);
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    footer span, footer a {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
    }

    footer a:hover { color: var(--ink); }

    /* ── MOBILE ── */
    @media (max-width: 680px) {
      :root { --pad: 20px; }

      .img-pair { flex-direction: column; }
      .img-pair .wide, .img-pair .tall { flex: unset; width: 100%; }
      .img-center { max-width: 100%; }

      .text-block { flex-direction: column; gap: 16px; }
      .text-block .t-right { text-align: left; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../">W.A. Jones</a>
    <a href="../">← Index</a>
  </nav>

  <header class="masthead">
    <div class="masthead-inner">
      <p class="pub-label">Editorial</p>
      <div class="untitled-logo">UN<span class="star">★</span>TLED</div>
      <div class="masthead-meta">
        <div class="meta-block">
          <span class="meta-label">Issue</span>
          <span class="meta-value">The Innovate Issue</span>
        </div>
        <div class="meta-block">
          <span class="meta-label">Subject</span>
          <span class="meta-value">Skip Marley</span>
        </div>
        <div class="meta-block">
          <span class="meta-label">Written by</span>
          <span class="meta-value">George Wayne</span>
        </div>
        <div class="meta-block">
          <span class="meta-label">Photography</span>
          <span class="meta-value byline">W.A. Jones</span>
        </div>
      </div>
    </div>
  </header>

  <div class="body">

    <!-- 1. Rooftop — full width, edge to edge, opens the page -->
    <div class="img-full fade-up">
      <img src="theuntitledmag-7.jpg" alt="Skip Marley, rooftop, New York City">
    </div>

    <p class="spread-note fade-up">Printed spread — both pages. Photography by W.A. Jones.</p>

    <!-- 2. Text block — fills the air between rooftop and hero -->
    <div class="text-block fade-up">
      <div class="t-left">Skip Marley</div>
      <div class="t-right">
        Untitled Magazine<br>
        The Innovate Issue<br>
        New York City
      </div>
    </div>

    <!-- 3. Hero — dreads flying, large centered portrait -->
    <div class="img-center fade-up">
      <img src="theuntitledmag-2.jpg" alt="Skip Marley, NYC street">
    </div>

    <!-- 4. Newsstand wide — landscape, full width, wall of magazines -->
    <div class="img-full fade-up">
      <img src="theuntitledmag-5.jpg" alt="Skip Marley at the newsstand">
    </div>

    <!-- 5. Doorway — two subjects, centered, intimate -->
    <div class="img-center fade-up">
      <img src="theuntitledmag-3.jpg" alt="Skip Marley, townhouse doorway">
    </div>

    <!-- 6. Newsstand facing + street crowd — portrait pair -->
    <div class="img-pair fade-up">
      <img src="theuntitledmag-4.jpg" alt="Skip Marley at newsstand, facing">
      <img src="theuntitledmag-6.jpg" alt="Skip Marley, street crowd">
    </div>

    <!-- 7. White wall woman — full width closer -->
    <div class="img-full fade-up">
      <img src="theuntitledmag.jpg" alt="Editorial frame, white wall">
    </div>

  </div>

  <footer>
    <span>© W.A. Jones — All rights reserved</span>
    <a href="../">wajones.co</a>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(el => {
        if (el.isIntersecting) {
          el.target.classList.add('visible');
          observer.unobserve(el.target);
        }
      });
    }, { threshold: 0.05 });

    document.querySelectorAll('.fade-up').forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight) {
        el.classList.add('visible');
      } else {
        observer.observe(el);
      }
    });
  </script>

</body>
</html>
