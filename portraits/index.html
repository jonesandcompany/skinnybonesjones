<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portraits — W.A. Jones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Erogenous';
    src: url('../../fonts/Erogenous-Regular.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --ink: #e8e4dc;
    --dim: #5a5650;
    --rule: #1e1e1e;
  }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 28px;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--rule);
  }

  nav a {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
    transition: color 0.2s;
  }

  nav a:hover { color: var(--dim); }

  /* ── PAGE HEADER ── */
  .page-header {
    padding: 6.5rem 3.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .page-title {
    font-family: 'Erogenous', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    letter-spacing: 0.01em;
    line-height: 1;
  }

  .page-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
  }

  .page-rule {
    width: 100%;
    height: 1px;
    background: var(--rule);
    margin-top: 0.5rem;
  }

  /* ── GRID ── */
  .grid {
    padding: 2.5rem 3.5rem 6rem;
    columns: 2;
    column-gap: 2rem;
  }

  @media (max-width: 600px) {
    .page-header {
      padding: 5.5rem 1.5rem 2rem;
    }
    .grid {
      columns: 1;
      padding: 2rem 1.5rem 5rem;
    }
  }

  @media (min-width: 1100px) {
    .grid {
      columns: 2;
      column-gap: 2.5rem;
      padding: 2.5rem 5rem 6rem;
    }
    .page-header {
      padding: 6.5rem 5rem 3rem;
    }
  }

  @media (min-width: 1600px) {
    .grid {
      columns: 2;
      column-gap: 3rem;
      padding: 2.5rem 7rem 6rem;
    }
    .page-header {
      padding: 6.5rem 7rem 3rem;
    }
  }

  .item {
    break-inside: avoid;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .item.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .item img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* subtle hover — just a breath of darkening */
  .item::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.4s ease;
  }

  .item:hover::after {
    background: rgba(0,0,0,0.12);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(10,10,10,0.97);
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }

  #lightbox.open {
    display: flex;
  }

  #lightbox img {
    max-width: 90vw;
    max-height: 90dvh;
    object-fit: contain;
    user-select: none;
    cursor: default;
  }

  #lb-close {
    position: fixed;
    top: 1.5rem; right: 2rem;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    transition: color 0.2s;
  }

  #lb-close:hover { color: var(--ink); }

  #lb-nav {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  #lb-nav button {
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.2s;
  }

  #lb-nav button:hover { color: var(--ink); }

  #lb-count {
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    color: var(--dim);
  }

  /* ── FOOTER ── */
  footer {
    padding: 2rem 3.5rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--rule);
  }

  footer a {
    color: var(--dim);
    text-decoration: none;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--ink); }

  footer span {
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<nav>
  <a href="../">W.A. Jones</a>
  <a href="../">← Back</a>
</nav>

<div class="page-header">
  <h1 class="page-title">Portraits</h1>
  <p class="page-subtitle">Selected portraiture, 2020–2026</p>
  <div class="page-rule"></div>
</div>

<div class="grid" id="grid">
  <div class="item"><img src="portraits-3.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-6.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="gardens-000.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-16.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-1.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-13.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-19.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-15.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-10.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-12.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-17.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-14.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="gardens-012.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-5.jpg" alt="Portrait" loading="lazy"></div>
  <div class="item"><img src="portraits-2.jpg" alt="Portrait" loading="lazy"></div>
</div>

<footer>
  <a href="../">← Back</a>
  <span>W.A. Jones</span>
  <span>Portraits</span>
</footer>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">Close</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-nav">
    <button id="lb-prev">← Prev</button>
    <span id="lb-count"></span>
    <button id="lb-next">Next →</button>
  </div>
</div>

<script>
  const items = Array.from(document.querySelectorAll('.item'));

  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          // stagger by column (2-col layout), 120ms apart — slow, deliberate
          const idx = items.indexOf(e.target);
          e.target.style.transitionDelay = (idx % 2) * 120 + 'ms';
          e.target.classList.add('visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.06 });
    items.forEach(el => io.observe(el));
  } else {
    items.forEach(el => el.classList.add('visible'));
  }

  // ── Lightbox ──
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCount = document.getElementById('lb-count');
  let current = 0;

  const srcs = items.map(el => el.querySelector('img').src);

  function openLB(idx) {
    current = idx;
    lbImg.src = srcs[current];
    lbCount.textContent = (current + 1) + ' / ' + srcs.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLB() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
  }

  function step(dir) {
    current = (current + dir + srcs.length) % srcs.length;
    lbImg.src = srcs[current];
    lbCount.textContent = (current + 1) + ' / ' + srcs.length;
  }

  items.forEach((el, i) => el.addEventListener('click', () => openLB(i)));
  document.getElementById('lb-close').addEventListener('click', closeLB);
  document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); step(-1); });
  document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); step(1); });

  lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });

  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLB();
    if (e.key === 'ArrowLeft') step(-1);
    if (e.key === 'ArrowRight') step(1);
  });

  // swipe support
  let touchX = 0;
  lb.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 44) step(dx < 0 ? 1 : -1);
    else closeLB();
  }, { passive: true });
</script>
</body>
</html>
